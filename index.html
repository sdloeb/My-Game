<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8-Bit Side Scroller</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
        }

        #game-container { 
            position: relative; 
            border: 4px solid #fff; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: #5c94fc;
            /* Match internal resolution defined in game.js */
            width: 256px;
            height: 224px;
            /* Scale up for visibility while keeping pixels sharp */
            transform: scale(2.5);
            image-rendering: pixelated; 
        }

        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
        }

        #ui-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            pointer-events: none; 
            padding: 4px; 
            box-sizing: border-box; 
            z-index: 10;
            /* Adjust font size for the 256px width */
            font-size: 8px;
        }

        #level-display { float: left; color: white; text-shadow: 1px 1px #000; }
        #bullet-display { float: left; color: #ffd700; margin-left: 10px; text-shadow: 1px 1px #000; }
        #timer-display { float: right; color: #ff0000; font-weight: bold; text-shadow: 1px 1px #000; }

        #start-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            cursor: pointer;
            text-align: center;
        }

        #start-overlay h1 { margin: 0; font-size: 14px; }
        #start-overlay p { margin: 4px 0 0 0; color: #ccc; font-size: 7px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-overlay" onclick="startFullScreen()">
        <h1>8-BIT ADVENTURE</h1>
        <p>CLICK TO START</p>
        <p style="font-size: 6px; margin-top: 10px;">(PRESS 'F' FOR FULLSCREEN)</p>
    </div>

    <div id="ui-container">
        <div id="level-display">Level 1-1</div>
        <div id="bullet-display">0</div>
        <div id="timer-display">TIME: 60</div>
    </div>
    
    <canvas id="gameCanvas" width="256" height="224"></canvas>
</div>

<script src="background.js"></script>
<script src="foreground.js"></script>
<script src="enemy.js"></script> <script src="player.js"></script>
<script src="game.js"></script>

<script>
    function startFullScreen() {
        const container = document.getElementById('game-container');
        const overlay = document.getElementById('start-overlay');
        
        overlay.style.display = 'none';

        // When not in actual browser-level fullscreen, we use CSS scale.
        // If the user triggers actual fullscreen, the browser handles the fill.
        if (typeof init === "function") init();
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyF') {
            const container = document.getElementById('game-container');
            if (!document.fullscreenElement) {
                // Reset scale before entering native fullscreen to prevent double-scaling
                container.style.transform = "scale(1)";
                container.requestFullscreen().catch(err => {
                    console.warn("Fullscreen failed:", err);
                    container.style.transform = "scale(2.5)";
                });
            } else {
                document.exitFullscreen();
            }
        }
    });

    // Reset scale when exiting native fullscreen
    document.addEventListener('fullscreenchange', () => {
        const container = document.getElementById('game-container');
        if (!document.fullscreenElement) {
            container.style.transform = "scale(2.5)";
        }
    });
</script>

</body>
</html>
