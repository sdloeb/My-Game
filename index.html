<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8-Bit Side Scroller</title>
    <style>
        /* 1. LAYOUT & BACKGROUND */
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #game-container {
            position: absolute;
            border: 2px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #5c94fc;
            image-rendering: pixelated;
            top: 50%;
            left: 50%;
            transform-origin: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 2. UI ELEMENTS */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 4px;
            box-sizing: border-box;
            z-index: 10;
            font-size: 8px;
        }

        #level-display { float: left; color: white; text-shadow: 1px 1px #000; }
        #bullet-display { float: left; color: #ffd700; margin-left: 10px; text-shadow: 1px 1px #000; }
        #timer-display { float: right; color: #ff0000; font-weight: bold; text-shadow: 1px 1px #000; }

        #start-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            cursor: pointer;
            text-align: center;
        }

        /* 3. TOUCH CONTROLS */
        #touch-controls {
            position: absolute;
            bottom: 2px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 30;
        }

        /* Add this inside your <style> tag */
#touch-controls > div:first-child {
    margin-left: 5px; /* Adjust this number to move them exactly where you want */
}

/* This pushes the Shoot and Jump buttons further left from the right edge */
#touch-controls > div:last-child {
    margin-right: 80px; /* Increase this number to move them further toward the middle */
}



        #touch-controls button {
            pointer-events: auto;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid #fff;
            color: white;
            border-radius: 4px;
            user-select: none;
        }

        @media (hover: hover) {
            #touch-controls { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-overlay" onclick="startFullScreen()">
            <h1>8-BIT ADVENTURE</h1>
            <p>CLICK TO START</p>
        </div>

        <div id="ui-container">
            <div id="level-display">Level 1-1</div>
            <div id="bullet-display">0</div>
            <div id="timer-display">TIME: 60</div>
        </div>

   <div id="touch-controls">
    <div style="display: flex; gap: 5px;"> <button id="btn-left">◀</button>
        <button id="btn-right">▶</button>
    </div>

           <div style="display: flex; gap: 5px;">
    <button id="btn-shoot">B</button> <button id="btn-up">▲</button>
</div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="background.js"></script>
    <script src="foreground.js"></script>
    <script src="enemy.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>

    <script>
    function applyResponsiveScale() {
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('gameCanvas');
        if (!container || !canvas) return;

        const winW = window.innerWidth;
        const winH = window.innerHeight;

        // 1. We keep the game height fixed at 224 pixels internally
        const targetHeight = 224;

        // 2. We calculate a width based on your ACTUAL screen shape
        // This removes the "empty space" on the sides in landscape
        const aspectRatio = winW / winH;
        const targetWidth = Math.floor(targetHeight * aspectRatio);

        // 3. Update the Canvas and Global Variables
        canvas.width = targetWidth;
        canvas.height = targetHeight;

        if (typeof CANVAS_WIDTH !== 'undefined') {
            CANVAS_WIDTH = targetWidth; // Updates the let CANVAS_WIDTH in game.js
        }

        if (bg) bg.canvasWidth = targetWidth;

        // 4. Position the container exactly in the center
        container.style.width = targetWidth + "px";
        container.style.height = targetHeight + "px";
        container.style.marginLeft = -(targetWidth / 2) + "px";
        container.style.marginTop = -(targetHeight / 2) + "px";

        // 5. THE BIG FIX: Scale to fill the ENTIRE window height
        // We multiply by 0.98 just to keep a tiny border visible
        const finalScale = (winH / targetHeight) * 0.98;
        container.style.transform = `scale(${finalScale})`;
    }

    function startFullScreen() {
        const overlay = document.getElementById('start-overlay');
        overlay.style.display = 'none';

        // Start logic from game.js
        if (typeof init === "function") {
            init();
        }

        // Attempt Fullscreen for mobile users
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
            document.documentElement.webkitRequestFullscreen();
        }
        
        applyResponsiveScale();
    }

    // Handle rotations and window resizing
    window.addEventListener('resize', applyResponsiveScale);
    document.addEventListener('fullscreenchange', applyResponsiveScale);
    
    // Initial call to set size
    applyResponsiveScale();
</script>
</body>
</html>
