<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>8-Bit Side Scroller</title>
    <style>
        #touch-controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: none;
            /* Allows clicks to pass through to buttons specifically */
            z-index: 30;
        }

        #touch-controls button {
            pointer-events: auto;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid #fff;
            color: white;
            font-size: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            /* Prevents text selection on iPhone */
        }

        .d-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .horizontal-btns {
            display: flex;
            gap: 5px;
        }

        .action-btns {
            display: flex;
            align-items: flex-end;
        }

        /* Hide touch controls on desktop/computer */
        @media (hover: hover) {
            #touch-controls {
                display: none;
            }
        }


        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #game-container {
            position: relative;
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #5c94fc;
            /* Match internal resolution defined in game.js */
            width: 256px;
            height: 224px;
            /* Dynamic scale will be handled by JavaScript */
            image-rendering: pixelated;
            /* Smooth scaling transitions */
            transition: transform 0.2s ease-out;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 4px;
            box-sizing: border-box;
            z-index: 10;
            /* Adjust font size for the 256px width */
            font-size: 8px;
        }

        #level-display {
            float: left;
            color: white;
            text-shadow: 1px 1px #000;
        }

        #bullet-display {
            float: left;
            color: #ffd700;
            margin-left: 10px;
            text-shadow: 1px 1px #000;
        }

        #timer-display {
            float: right;
            color: #ff0000;
            font-weight: bold;
            text-shadow: 1px 1px #000;
        }

        #start-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            cursor: pointer;
            text-align: center;
        }

        #start-overlay h1 {
            margin: 0;
            font-size: 14px;
        }

        #start-overlay p {
            margin: 4px 0 0 0;
            color: #ccc;
            font-size: 7px;
        }
    </style>
</head>

<body>

    <div id="game-container">

        <div id="touch-controls">
            <div class="d-pad">
                <button id="btn-up">▲</button>
                <div class="horizontal-btns">
                    <button id="btn-left">◀</button>
                    <button id="btn-down">▼</button>
                    <button id="btn-right">▶</button>
                </div>
            </div>
            <div class="action-btns">
                <button id="btn-shoot">B</button>
            </div>
        </div>

        <div id="start-overlay" onclick="startFullScreen()">
            <h1>8-BIT ADVENTURE</h1>
            <p>CLICK TO START</p>
            <p style="font-size: 6px; margin-top: 10px;">(PRESS 'F' FOR FULLSCREEN)</p>
        </div>

        <div id="ui-container">
            <div id="level-display">Level 1-1</div>
            <div id="bullet-display">0</div>
            <div id="timer-display">TIME: 60</div>
        </div>

        <canvas id="gameCanvas" width="256" height="224"></canvas>
    </div>

    <script src="background.js"></script>
    <script src="foreground.js"></script>
    <script src="enemy.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>

    <script>
        function applyResponsiveScale() {
            const container = document.getElementById('game-container');
            // Calculate how much we can scale the 256x224 box to fit the window
            const scaleX = window.innerWidth / 256;
            const scaleY = window.innerHeight / 224;

            // Use the smaller of the two to ensure the game isn't cropped
            // We subtract a tiny bit (0.95) to leave room for the white border
            const finalScale = Math.min(scaleX, scaleY) * 0.95;

            container.style.transform = `scale(${finalScale})`;
        }

        function startFullScreen() {
            const container = document.getElementById('game-container');
            const overlay = document.getElementById('start-overlay');

            overlay.style.display = 'none';

            // Attempt to enter native browser fullscreen on mobile
            if (container.requestFullscreen) {
                container.requestFullscreen().catch(err => {
                    console.log("Auto-fullscreen blocked, staying in windowed mode.");
                });
            }

            if (typeof init === "function") init();

            // Apply initial scale
            applyResponsiveScale();
        }

        // Keep the game scaled correctly if the phone is rotated
        window.addEventListener('resize', applyResponsiveScale);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyF') {
                const container = document.getElementById('game-container');
                if (!document.fullscreenElement) {
                    container.requestFullscreen().catch(err => {
                        console.warn("Fullscreen failed:", err);
                    });
                } else {
                    document.exitFullscreen();
                }
            }
        });

        // Ensure scale stays correct during fullscreen transitions
        document.addEventListener('fullscreenchange', applyResponsiveScale);
    </script>

</body>

</html>
